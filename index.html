<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Storm&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ay3ent</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Bungee','Rubik Storm',sans-serif;
}

body,html{height:100%;overflow:hidden;background:#0a0015;color:#fff}

/* VIDEO */
.bg{
 position:fixed;
 inset:0;
 z-index:-2;
}
.bg video{
 width:100%;
 height:100%;
 object-fit:cover;
}

/* INTRO */
#intro{
 position:fixed;
 inset:0;
 backdrop-filter:blur(40px);
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:28px;
 cursor:pointer;
 z-index:999;
}

@keyframes pulse{
 0%,100%{opacity:0.6}
 50%{opacity:1}
}

/* MAIN */
#main{
 display:none;
 position:fixed;
 inset:0;
}

#main.show{display:block}

/* CARD */
.card{
 width:80vw;
 height:80vh;
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 border-radius:30px;
 backdrop-filter:blur(25px);
 background:rgba(20,20,40,0.2);
 box-shadow:0 0 40px rgba(80,0,200,0.6);
 border:1px solid rgba(120,0,255,0.4);
}

.centerWrap{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:10px;
}

/* AVATAR */
.avatar{
 width:130px;
 height:130px;
 border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 20px #4c00ff;
}

/* NAME */
.name{
 font-size:26px;
 text-align:center;
 color:#fff;
 text-shadow:0 0 10px #4c00ff,0 0 20px #1a00ff;
}

/* LINKS */
.links{
 display:flex;
 gap:30px;
}
.link{position:relative}
.link img{
 width:40px;
 transition:0.3s;
}
.link:hover img{
 transform:scale(1.3);
 filter:drop-shadow(0 0 10px #4c00ff);
}
.link span{
 position:absolute;
 bottom:-35px;
 left:50%;
 transform:translateX(-50%);
 font-size:16px;
 opacity:0;
 transition:0.3s;
 text-shadow:0 0 10px #4c00ff;
}
.link:hover span{opacity:1}

/* PLAYER */
.player{
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:80%;
 max-width:300px;
}

button{
 background:none;
 border:none;
 color:white;
 font-size:18px;
 cursor:pointer;
 text-shadow:0 0 10px #4c00ff;
}

input[type=range]{width:100%}

.eq{
 display:flex;
 justify-content:center;
 gap:4px;
 margin-bottom:8px;
}
.eq div{
 width:4px;
 height:10px;
 background:white;
 box-shadow:0 0 10px #4c00ff;
}
</style>
</head>

<body>

<div class="bg">
 <video src="gd.mp4" autoplay muted loop playsinline></video>
</div>

<div id="intro"><span style="animation:pulse 2s infinite">click to enter</span></div>

<div id="main">
 <div class="card">
  <div class="centerWrap">
   <div class="avatar"></div>
   <div class="name">ay3ent</div>

   <div class="links">
    <a href="https://twitch.tv/ay3ent" target="_blank" class="link">
     <img src="twitch.png">
     <span>twitch</span>
    </a>
    <a href="https://t.me/ay3ent" target="_blank" class="link">
     <img src="tg.png">
     <span>telegram</span>
    </a>
   </div>
  </div>

  <div class="player">
   <div class="eq" id="eq">
    <div></div><div></div><div></div><div></div>
   </div>
   <button id="play">▶</button>
   <input type="range" id="progress" value="0">
   <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
 </div>
</div>

<audio id="audio" src="mus.mp3" loop></audio>

<script>
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const progress = document.getElementById('progress');
const volume = document.getElementById('volume');
const eqBars = document.querySelectorAll('#eq div');

let ctx, analyser, source;

intro.onclick = () => {
 intro.style.display='none';
 main.classList.add('show');

 ctx = new (window.AudioContext || window.webkitAudioContext)();
 analyser = ctx.createAnalyser();
 source = ctx.createMediaElementSource(audio);
 source.connect(analyser);
 analyser.connect(ctx.destination);

 audio.play();
 playBtn.textContent='⏸';
 animate();
};

playBtn.onclick = () => {
 if(audio.paused){
  audio.play();
  playBtn.textContent='⏸';
 } else {
  audio.pause();
  playBtn.textContent='▶';
 }
};

/* FIXED ERROR: removed broken extra else */

audio.ontimeupdate = () => {
 progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = () => {
 audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = () => {
 audio.volume = volume.value;
};

function animate(){
 requestAnimationFrame(animate);
 let data = new Uint8Array(analyser.frequencyBinCount);
 analyser.getByteFrequencyData(data);

 eqBars.forEach((bar,i)=>{
  bar.style.height = (data[i]/10)+"px";
 });
}
</script>

</body>
</html>
