<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Storm&display=swap" rel="stylesheet">

<title>ay3ent</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Bungee','Rubik Storm',sans-serif;
}

body,html{
 height:100%;
 overflow:hidden;
}

/* VIDEO BACKGROUND */
.bg{
 position:fixed;
 inset:0;
 z-index:-1;
}
.bg video{
 width:100%;
 height:100%;
 object-fit:cover;
}

/* INTRO */
#intro{
 position:fixed;
 inset:0;
 backdrop-filter:blur(40px);
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:28px;
 cursor:pointer;
 z-index:10;
}

/* MAIN */
#main{
 display:none;
 position:fixed;
 inset:0;
}

/* CARD */
.card{
 width:80vw;
 height:80vh;

 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);

 border-radius:30px;
 backdrop-filter:blur(20px);
 background:rgba(255,255,255,0.03);

 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
}

/* ANIMATION */
.cardInner{
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:10px;

 opacity:0;
 transform:translateY(80px);
}
.card.show .cardInner{
 opacity:1;
 transform:translateY(0);
 transition:0.8s ease;
}

/* AVATAR */
.avatar{
 width:130px;
 height:130px;
 border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 20px white;
}

/* NAME */
.name{
 font-size:24px;
 border-right:2px solid white;
 width:0;
 overflow:hidden;
 white-space:nowrap;
 animation:typing 3s steps(10) forwards;
}
@keyframes typing{
 to{width:100%}
}

/* LINKS */
.links{
 display:flex;
 gap:25px;
 margin-top:10px;
}
.link{
 position:relative;
}
.link img{
 width:40px;
 transition:0.3s;
}
.link:hover img{
 transform:scale(1.3);
 filter:drop-shadow(0 0 10px white);
}
.link span{
 position:absolute;
 bottom:-30px;
 left:50%;
 transform:translateX(-50%);
 font-size:16px;
 opacity:0;
 transition:0.3s;
 color:white;
 text-shadow:0 0 10px white;
}
.link:hover span{
 opacity:1;
 bottom:-45px;
}

/* PLAYER */
.player{
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:80%;
 max-width:300px;
}
input[type=range]{
 width:100%;
}
button{
 background:none;
 border:none;
 color:white;
 font-size:18px;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="bg">
 <video src="gd.mp4" autoplay muted loop playsinline></video>
</div>

<div id="intro">click to enter</div>

<div id="main">
 <div class="card">
  <div class="cardInner">

   <div class="avatar"></div>
   <div class="name">ay3ent</div>

   <div class="links">
    <a href="https://twitch.tv/ay3ent" target="_blank" class="link">
     <img src="twitch.png">
     <span>twitch</span>
    </a>

    <a href="https://t.me/ay3ent" target="_blank" class="link">
     <img src="tg.png">
     <span>telegram</span>
    </a>
   </div>

  </div>

  <div class="player">
   <button id="play">▶</button>
   <input type="range" id="progress" value="0">
   <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>

 </div>
</div>

<audio id="audio" src="mus.mp3" loop></audio>

<script>
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const progress = document.getElementById('progress');
const volume = document.getElementById('volume');
const card = document.querySelector('.card');

intro.onclick = () => {
 intro.style.display = 'none';

 main.style.display = 'block';
 card.classList.add('show');

 audio.play();
};

playBtn.onclick = () => {
 if(audio.paused){
  audio.play();
  playBtn.textContent='⏸';
 }else{
  audio.pause();
  playBtn.textContent='▶';
 }
};

audio.ontimeupdate = () => {
 progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = () => {
 audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = () => {
 audio.volume = volume.value;
};
</script>

</body>
</html>
