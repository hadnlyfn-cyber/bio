<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ay3ent</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body,html{height:100%;overflow:hidden;background:#0a0015;color:#fff}

.bg{
 position:fixed;
 width:100%;height:100%;
 overflow:hidden;
 z-index:-2;
}

.bg video{
 width:100%;
 height:100%;
 object-fit:cover;
}

.overlay{
 position:fixed;
 width:100%;height:100%;
 background:radial-gradient(circle, rgba(150,0,255,0.2), rgba(0,0,0,0.8));
 z-index:-1;
}

canvas{
 position:fixed;
 width:100%;height:100%;
 z-index:-1;
}

#intro{
 position:fixed;
 width:100%;
 height:100%;
 backdrop-filter:blur(30px);
 -webkit-backdrop-filter:blur(30px);
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:28px;
 letter-spacing:2px;
 cursor:pointer;
 z-index:999; /* перекрывает всё */
}

@keyframes pulse{
 0%,100%{opacity:0.7}
 50%{opacity:1}
}
 50%{opacity:1}
}

#main{
 display:none;
 position:fixed;
 inset:0;
 width:100%;
 height:100%;
 /* убираем флекс, чтобы исключить сдвиги */
}

#main.show{
 display:block;
 animation:fadeIn 0.6s ease forwards;
}

.show{
 display:flex !important;
 animation:slideUp 1s ease forwards;
}

.card{
 width:80vw;
 height:80vh;
 position:absolute;
 left:50%;
 top:12vh; /* отступ сверху */
 transform:translateX(-50%);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 padding:30px;
 border-radius:30px;
 backdrop-filter:blur(25px);
 -webkit-backdrop-filter:blur(25px);
 background:rgba(255,255,255,0.03);
 text-align:center;
}

.card::before{
 content:"";
 position:absolute;
 inset:-1.5px;
 border-radius:28px;
 background:linear-gradient(270deg, rgba(168,85,247,0.5), rgba(255,255,255,0.4), rgba(168,85,247,0.5));
 background-size:400% 400%;
 animation:borderAnim 8s linear infinite;
 z-index:-1;
 filter:blur(14px);
 opacity:0.6;
}

@keyframes borderAnim{
 0%{background-position:0%}
 100%{background-position:300%}
}

@keyframes slideUp{
 from{transform:translate(-50%, 100px);opacity:0;filter:blur(20px)}
 to{transform:translate(-50%, 0);opacity:1;filter:blur(0)}
}
 to{transform:translateY(0);opacity:1;filter:blur(0)}
}

.avatar{
 width:130px;height:130px;
 border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 15px rgba(255,255,255,0.6);
 margin-bottom:10px;
}
.avatar:hover{transform:scale(1.1);box-shadow:0 0 30px #fff}

.name{
 margin-top:10px;
 font-size:24px;
 white-space:nowrap;
 overflow:hidden;
 border-right:2px solid rgba(255,255,255,0.7);
 width:0;
 animation:typing 3s steps(10) forwards;
 text-shadow:0 0 10px rgba(255,255,255,0.6);
}

@keyframes typing{to{width:100%}}

.links{
 margin-top:20px;
 display:flex;
 justify-content:center;
 gap:20px;
}

.link{
 position:relative;
 cursor:pointer;
}

.link img{
 width:40px;
 transition:0.3s;
}

.link:hover img{
 transform:scale(1.3);
 filter:drop-shadow(0 0 15px white);
}

.link span{
 position:absolute;
 bottom:-25px;
 left:50%;
 transform:translateX(-50%);
 font-size:16px;
 color:#fff;
 opacity:0;
 transition:0.3s;
 white-space:nowrap;
 text-shadow:0 0 10px white;
}

.link:hover span{
 opacity:1;
 bottom:-40px;
}

.link:hover span{opacity:1;bottom:-30px}

.player{
 margin-top:auto;
 width:100%;
 max-width:300px;
 opacity:0.9;
}

input[type=range]{
 width:100%;
 accent-color:#a855f7;
}

button{
 background:none;border:none;color:white;font-size:18px;cursor:pointer;
 transition:0.2s;
}
button:hover{transform:scale(1.2)}

.eq{
 display:flex;
 justify-content:center;
 gap:3px;
 margin-top:10px;
}

.eq div{
 width:4px;height:10px;background:white;
}

@media(max-width:500px){
 .card{width:90%}
 .avatar{width:100px;height:100px}
}
</style>
</head>

<body>

<div class="bg" id="bg">
  <video src="gd.mp4" autoplay muted loop playsinline></video>
</div>
<div class="overlay"></div>
<canvas id="particles"></canvas>

<div id="intro"><span style="animation:pulse 2s infinite;">click to enter</span></div>

<div id="main">
 <div class="card">
  <div class="avatar"></div>
  <div class="name">ay3ent</div>

  <div class="links">
   <a href="https://twitch.tv/ay3ent" target="_blank" class="link">
    <img src="twitch.png">
    <span>twitch</span>
   </a>
   <a href="https://t.me/ay3ent" target="_blank" class="link">
    <img src="tg.png">
    <span>telegram</span>
   </a>
  </div>

  <div class="player">
   <button id="play">▶</button>
   <input type="range" id="progress" value="0">
   <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
   <div class="eq" id="eq">
    <div></div><div></div><div></div>
   </div>
  </div>
 </div>
</div>

<audio id="audio" src="mus.mp3" loop></audio>

<script>
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const progress = document.getElementById('progress');
const volume = document.getElementById('volume');
const bg = document.getElementById('bg');
const eqBars = document.querySelectorAll('#eq div');

let ctx, analyser, source;

intro.onclick = async () => {
 intro.style.opacity='0';
 setTimeout(()=>intro.style.display='none',500);
 
 main.classList.add('show');
 document.querySelector('.card').style.animation = 'slideUp 1s ease forwards';

 ctx = new (window.AudioContext || window.webkitAudioContext)();
 analyser = ctx.createAnalyser();
 source = ctx.createMediaElementSource(audio);
 source.connect(analyser);
 analyser.connect(ctx.destination);

 audio.play();
 animate();
}

playBtn.onclick = () => {
 if(audio.paused){audio.play();playBtn.textContent='⏸'}
 else{audio.pause();playBtn.textContent='▶'}
}

audio.ontimeupdate = () => {
 progress.value = (audio.currentTime / audio.duration) * 100;
}

progress.oninput = () => {
 audio.currentTime = (progress.value / 100) * audio.duration;
}

volume.oninput = () => {
 audio.volume = volume.value;
}

function animate(){
 requestAnimationFrame(animate);
 let data = new Uint8Array(analyser.frequencyBinCount);
 analyser.getByteFrequencyData(data);

 let avg = data.reduce((a,b)=>a+b)/data.length;
 let scale = 1 + avg/300;
 bg.style.transform = `scale(${scale})`;

 eqBars.forEach((bar,i)=>{
  bar.style.height = (data[i]/10)+"px";
 });
}

// particles
const canvas = document.getElementById('particles');
const c = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
for(let i=0;i<80;i++){
 particlesArray.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  size:Math.random()*2,
  speed:Math.random()*0.5
 });
}

function drawParticles(){
 c.clearRect(0,0,canvas.width,canvas.height);
 particlesArray.forEach(p=>{
  c.beginPath();
  c.arc(p.x,p.y,p.size,0,Math.PI*2);
  c.fillStyle='white';
  c.fill();
  p.y -= p.speed;
  if(p.y<0) p.y=canvas.height;
 });
 requestAnimationFrame(drawParticles);
}

drawParticles();
</script>

</body>
</html>
