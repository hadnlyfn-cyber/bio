<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Storm&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ay3ent</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Bungee','Rubik Storm',sans-serif}
body,html{height:100%;overflow:hidden;color:#fff}

/* BG */
.bg{position:fixed;inset:0;z-index:-2}
.bg video{width:100%;height:100%;object-fit:cover;transition:transform 0.8s ease, filter 0.2s}

/* INTRO */
#intro{
 position:fixed;inset:0;
 backdrop-filter:blur(40px);
 display:flex;justify-content:center;align-items:center;
 font-size:28px;cursor:pointer;z-index:999;
 transition:opacity 0.5s ease, backdrop-filter 0.5s ease;
}
#intro.hide{
 opacity:0;
 backdrop-filter:blur(0);
 pointer-events:none;
}

/* MAIN */
#main{display:none;position:fixed;inset:0}

/* CARD */
.card{
 width:80vw;height:80vh;
 position:absolute;
 left:50%;top:50%;

 transform:translate(-50%,110vh);
 opacity:0;

 border-radius:30px;
 backdrop-filter:blur(25px);
 background:rgba(20,20,40,0.1);
 box-shadow:0 0 40px rgba(80,0,200,0.5);
 border:1px solid rgba(120,0,255,0.3);

 transition:
  transform 0.45s cubic-bezier(0.18,1.2,0.3,1),
  opacity 0.3s;
}

.card.show{
 transform:translate(-50%,-50%);
 opacity:1;
}

/* INNER */
.cardInner{
 width:100%;
 height:100%;
 transition:transform 0.1s linear;
}

/* CENTER */
.centerWrap{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 display:flex;flex-direction:column;align-items:center;gap:10px;
}

/* AVATAR */
.avatar{
 width:130px;height:130px;border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 20px #4c00ff;
 cursor:pointer;
}

/* NAME */
.name{
 font-size:26px;
 text-shadow:0 0 10px #4c00ff;
}

/* STATUS */
.status{
 font-size:14px;
 opacity:0.7;
 text-shadow:0 0 8px #4c00ff;
}

/* LINKS */
.links{display:flex;gap:30px}
.link{position:relative}
.link img{width:40px;transition:0.3s}
.link:hover img{transform:scale(1.3)}
.link span{
 position:absolute;bottom:-30px;left:50%;
 transform:translateX(-50%);
 opacity:0;transition:0.3s;
}
.link:hover span{opacity:1;bottom:-45px}

/* PLAYER */
.player{
 position:absolute;bottom:20px;left:50%;
 transform:translateX(-50%);
 width:80%;max-width:320px;
 display:flex;flex-direction:column;gap:8px;
}

.volumeWrap{display:flex;gap:6px;align-items:center}
#volume{width:80px}

.time{display:flex;justify-content:space-between;font-size:12px;opacity:0.7}

/* PROGRESS */
#progress{
 width:100%;
 height:6px;
 appearance:none;
 background:rgba(255,255,255,0.1);
 border-radius:10px;
 position:relative;
}
#progress::-webkit-slider-thumb{appearance:none;width:0}
#progress::before{
 content:'';
 position:absolute;
 height:6px;
 width:var(--progress,0%);
 background:linear-gradient(90deg,#6a00ff,#00c3ff);
 box-shadow:0 0 10px #6a00ff,0 0 20px #00c3ff;
 border-radius:10px;
}

/* EQ */
.eq{display:flex;gap:4px;justify-content:center;align-items:flex-end}
.eq div{
 width:4px;height:5px;
 background:white;
 box-shadow:0 0 10px #4c00ff;
}

/* CLICK FX */
.clickFX{
 position:fixed;
 border-radius:50%;
 pointer-events:none;
 transform:translate(-50%,-50%);
 background:radial-gradient(circle,#6a00ff,transparent);
 animation:clickAnim 0.6s ease-out forwards;
}
@keyframes clickAnim{
 from{width:0;height:0;opacity:1}
 to{width:200px;height:200px;opacity:0}
}

/* SECRET */
.secret{
 box-shadow:0 0 80px #6a00ff,0 0 120px #00c3ff !important;
 border:1px solid #00c3ff !important;
}

/* MOBILE */
@media(max-width:768px){
 .card{width:90vw;height:85vh}
 .avatar{width:90px;height:90px}
 .name{font-size:20px}
 .links img{width:32px}
 .link span{display:none}
 #volume{width:60px}
}
</style>
</head>

<body>

<div class="bg">
 <video id="bgvid" src="gd.mp4" autoplay muted loop playsinline></video>
</div>

<div id="intro">click to enter</div>

<div id="main">
 <div class="card" id="card">
  <div class="cardInner" id="cardInner">

   <div class="centerWrap">
    <div class="avatar"></div>
    <div class="name">ay3ent</div>
    <div class="status" id="status">online</div>

    <div class="links">
     <a href="https://twitch.tv/ay3ent" target="_blank" class="link">
      <img src="twitch.png"><span>twitch</span>
     </a>
     <a href="https://t.me/ay3ent" target="_blank" class="link">
      <img src="tg.png"><span>telegram</span>
     </a>
    </div>
   </div>

   <div class="player">
    <div class="volumeWrap">
     <span id="volIcon">🔊</span>
     <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="time">
     <span id="current">0:00</span>
     <span id="duration">0:00</span>
    </div>

    <input type="range" id="progress" value="0">

    <div class="eq" id="eq">
     <div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <div class="controls">
     <button id="play">▶</button>
    </div>
   </div>

  </div>
 </div>
</div>

<audio id="audio" src="mus.mp3"></audio>

<script>
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const card=document.getElementById('card');
const cardInner=document.getElementById('cardInner');
const audio=document.getElementById('audio');
const playBtn=document.getElementById('play');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const volIcon=document.getElementById('volIcon');
const current=document.getElementById('current');
const duration=document.getElementById('duration');
const eqBars=document.querySelectorAll('#eq div');
const video=document.getElementById('bgvid');
const statusEl=document.getElementById('status');

let ctx,analyser,source;

/* INTRO */
intro.onclick=()=>{
 intro.classList.add('hide');
 video.style.transform='scale(1.1)';

 main.style.display='block';

 requestAnimationFrame(()=>{
  card.classList.add('show');
 });

 ctx=new(window.AudioContext||window.webkitAudioContext)();
 analyser=ctx.createAnalyser();
 analyser.fftSize=64;

 source=ctx.createMediaElementSource(audio);
 source.connect(analyser);
 analyser.connect(ctx.destination);

 audio.play();
 playBtn.textContent='⏸';

 animate();
};

/* PLAYER */
playBtn.onclick=()=>{
 if(audio.paused){audio.play();playBtn.textContent='⏸'}
 else{audio.pause();playBtn.textContent='▶'}
};

volume.oninput=()=>{
 audio.volume=volume.value;
 volIcon.textContent=volume.value==0?'🔇':volume.value<0.5?'🔉':'🔊';
};

audio.onloadedmetadata=()=>{
 duration.textContent=format(audio.duration);
};

audio.ontimeupdate=()=>{
 let percent=(audio.currentTime/audio.duration)*100;
 progress.value=percent;
 progress.style.setProperty('--progress',percent+'%');
 current.textContent=format(audio.currentTime);
};

progress.oninput=()=>{
 audio.currentTime=(progress.value/100)*audio.duration;
};

function format(t){
 let m=Math.floor(t/60);
 let s=Math.floor(t%60);
 if(s<10)s='0'+s;
 return m+':'+s;
}

/* STATUS */
const statuses=["online","listening to music","coding...","afk"];
setInterval(()=>{
 statusEl.textContent=statuses[Math.floor(Math.random()*statuses.length)];
},4000);

/* CLICK FX */
document.addEventListener('click',(e)=>{
 let fx=document.createElement('div');
 fx.className='clickFX';
 fx.style.left=e.clientX+'px';
 fx.style.top=e.clientY+'px';
 document.body.appendChild(fx);
 setTimeout(()=>fx.remove(),600);
});

/* SECRET */
let clicks=0;
document.querySelector('.avatar').onclick=(e)=>{
 e.stopPropagation();
 clicks++;
 if(clicks>=5){
  card.classList.toggle('secret');
  clicks=0;
 }
};

/* ANIMATION */
function animate(){
 requestAnimationFrame(animate);

 let data=new Uint8Array(analyser.frequencyBinCount);
 analyser.getByteFrequencyData(data);

 eqBars.forEach((bar,i)=>{
  bar.style.height=(data[i]/255*25+5)+'px';
 });

 let bass=data[1]/255;

 cardInner.style.transform=`scale(${1+bass*0.05})`;

 card.style.boxShadow=`0 0 ${40+bass*80}px #6a00ff,0 0 ${60+bass*120}px #00c3ff`;

 document.querySelector('.name').style.transform=`scale(${1+bass*0.02})`;

 video.style.filter=`brightness(${1+bass*0.5})`;
}
</script>

</body>
</html>
