<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Storm&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ay3ent</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Bungee','Rubik Storm',sans-serif}
body,html{height:100%;overflow:hidden;background:transparent;color:#fff}

/* VIDEO */
.bg{position:fixed;inset:0;z-index:-2}
.bg video{width:100%;height:100%;object-fit:cover;transition:0.3s}

/* INTRO */
#intro{
 position:fixed;inset:0;
 backdrop-filter:blur(40px);
 display:flex;justify-content:center;align-items:center;
 font-size:28px;cursor:pointer;z-index:999
}

/* MAIN */
#main{display:none;position:fixed;inset:0}
#main.show{display:block}

/* CARD */
.card{
 width:80vw;height:80vh;
 position:absolute;left:50%;top:50%;
 transform:translate(-50%,-50%);
 border-radius:30px;
 backdrop-filter:blur(25px);
 background:rgba(20,20,40,0.1);
 box-shadow:0 0 40px rgba(80,0,200,0.5);
 border:1px solid rgba(120,0,255,0.3);
}

/* CENTER */
.centerWrap{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 display:flex;flex-direction:column;align-items:center;gap:12px;
}

/* AVATAR */
.avatar{
 width:130px;height:130px;border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 20px #4c00ff;
 animation:breath 3s infinite ease-in-out;
}
@keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* NAME */
.name{
 font-size:26px;text-align:center;
 text-shadow:0 0 10px #4c00ff,0 0 20px #1a00ff;
}

/* LINKS */
.links{display:flex;gap:30px}
.link img{width:40px;transition:0.3s}
.link:hover img{transform:scale(1.3);filter:drop-shadow(0 0 10px #4c00ff)}
.link span{
 position:absolute;bottom:-35px;left:50%;
 transform:translateX(-50%);
 font-size:16px;opacity:0;transition:0.3s;
 text-shadow:0 0 10px #4c00ff;
}
.link:hover span{opacity:1}

/* PLAYER */
.player{
 position:absolute;bottom:20px;left:50%;
 transform:translateX(-50%);
 width:80%;max-width:300px;
 display:flex;flex-direction:column;align-items:center;gap:8px;
}

/* VOLUME */
.volumeWrap{
 display:flex;align-items:center;gap:6px;
}
#volume{
 width:80px;
 opacity:0.8;
}

/* PROGRESS */
#progress{
 width:100%;
 height:4px;
}

/* EQ */
.eq{
 display:flex;
 gap:4px;
 align-items:flex-end;
}
.eq div{
 width:4px;
 height:5px;
 background:white;
 box-shadow:0 0 10px #4c00ff;
}

/* BUTTON */
button{
 background:none;border:none;
 color:white;font-size:18px;cursor:pointer;
}
</style>
</head>

<body>

<div class="bg">
 <video id="bgvid" src="gd.mp4" autoplay muted loop playsinline></video>
</div>

<div id="intro">click to enter</div>

<div id="main">
 <div class="card" id="card">

  <div class="centerWrap">
   <div class="avatar"></div>
   <div class="name">ay3ent</div>

   <div class="links">
    <a href="https://twitch.tv/ay3ent" target="_blank">
     <img src="twitch.png">
    </a>
    <a href="https://t.me/ay3ent" target="_blank">
     <img src="tg.png">
    </a>
   </div>
  </div>

  <div class="player">

   <!-- volume -->
   <div class="volumeWrap">
    <span id="volIcon">🔊</span>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
   </div>

   <!-- play -->
   <button id="play">▶</button>

   <!-- progress -->
   <input type="range" id="progress" value="0">

   <!-- eq -->
   <div class="eq" id="eq">
    <div></div><div></div><div></div><div></div><div></div><div></div>
   </div>

  </div>

 </div>
</div>

<audio id="audio" src="mus.mp3" loop></audio>

<script>
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const audio=document.getElementById('audio');
const playBtn=document.getElementById('play');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const volIcon=document.getElementById('volIcon');
const eqBars=document.querySelectorAll('#eq div');
const video=document.getElementById('bgvid');

let ctx,analyser,source;

intro.onclick=()=>{
 intro.style.display='none';
 main.classList.add('show');
 video.style.transform='scale(1.1)';

 ctx=new(window.AudioContext||window.webkitAudioContext)();
 analyser=ctx.createAnalyser();
 analyser.fftSize=64;
 source=ctx.createMediaElementSource(audio);
 source.connect(analyser);
 analyser.connect(ctx.destination);

 audio.play();
 playBtn.textContent='⏸';
 animate();
}

playBtn.onclick=()=>{
 if(audio.paused){audio.play();playBtn.textContent='⏸'}
 else{audio.pause();playBtn.textContent='▶'}
}

volume.oninput=()=>{
 audio.volume=volume.value;
 if(volume.value==0) volIcon.textContent='🔇';
 else if(volume.value<0.5) volIcon.textContent='🔉';
 else volIcon.textContent='🔊';
}

audio.ontimeupdate=()=>{
 progress.value=(audio.currentTime/audio.duration)*100;
}

progress.oninput=()=>{
 audio.currentTime=(progress.value/100)*audio.duration;
}

function animate(){
 requestAnimationFrame(animate);
 let data=new Uint8Array(analyser.frequencyBinCount);
 analyser.getByteFrequencyData(data);

 eqBars.forEach((bar,i)=>{
  let val=data[i]/255;
  bar.style.height=(val*25+5)+'px';
 });

 let bass=data[1]/255;
 video.style.filter=`brightness(${1+bass*0.4})`;
}
</script>

</body>
</html>
