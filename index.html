<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Storm&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ay3ent</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Bungee','Rubik Storm',sans-serif}
body,html{height:100%;overflow:hidden;color:#fff}

/* BACKGROUND */
.bg{position:fixed;inset:0;z-index:-2}
.bg video{width:100%;height:100%;object-fit:cover}

/* INTRO */
#intro{
 position:fixed;inset:0;
 backdrop-filter:blur(40px);
 display:flex;justify-content:center;align-items:center;
 font-size:28px;cursor:pointer;z-index:999
}

/* MAIN */
#main{display:none;position:fixed;inset:0}

/* CARD */
.card{
 width:80vw;height:80vh;
 position:absolute;left:50%;top:50%;
 transform:translate(-50%,150%);
 border-radius:30px;
 backdrop-filter:blur(25px);
 background:rgba(20,20,40,0.1);
 box-shadow:0 0 40px rgba(80,0,200,0.5);
 border:1px solid rgba(120,0,255,0.3);
 transition:transform 0.8s ease;
}
.card.show{transform:translate(-50%,-50%)}

/* CENTER */
.centerWrap{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 display:flex;flex-direction:column;align-items:center;gap:12px;
}

/* AVATAR */
.avatar{
 width:130px;height:130px;border-radius:50%;
 background:url('avatar.jpg') center/cover no-repeat;
 box-shadow:0 0 20px #4c00ff;
}

/* NAME */
.name{
 font-size:26px;
 text-shadow:0 0 10px #4c00ff;
}

/* LINKS */
.links{display:flex;gap:30px}
.link{position:relative}
.link img{width:40px;transition:0.3s}
.link:hover img{transform:scale(1.3)}
.link span{
 position:absolute;bottom:-30px;left:50%;
 transform:translateX(-50%);
 opacity:0;transition:0.3s;
}
.link:hover span{opacity:1;bottom:-45px}

/* PLAYER */
.player{
 position:absolute;bottom:20px;left:50%;
 transform:translateX(-50%);
 width:80%;max-width:320px;
 display:flex;flex-direction:column;gap:6px;
}

.time{
 display:flex;justify-content:space-between;
 font-size:12px;opacity:0.7;
}

/* PROGRESS */
#progress{
 width:100%;
 height:6px;
 appearance:none;
 background:rgba(255,255,255,0.1);
 border-radius:10px;
 overflow:hidden;
 position:relative;
}

#progress::-webkit-slider-thumb{
 appearance:none;
 width:0;
}

#progress::before{
 content:'';
 position:absolute;
 height:6px;
 width:var(--progress,0%);
 background:linear-gradient(90deg,#6a00ff,#00c3ff);
 box-shadow:0 0 10px #6a00ff,0 0 20px #00c3ff;
 border-radius:10px;
}

/* WAVE */
#wave{
 width:100%;
 height:60px;
}

/* CONTROLS */
.controls{
 display:flex;justify-content:center;align-items:center;gap:10px;
}

button{
 background:none;border:none;
 color:white;font-size:18px;cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
 .card{width:90vw;height:85vh}
 .avatar{width:90px;height:90px}
 .name{font-size:20px}
 .links img{width:32px}
 .link span{opacity:1;bottom:-30px;font-size:14px}
}
</style>
</head>

<body>

<div class="bg">
 <video src="gd.mp4" autoplay muted loop playsinline></video>
</div>

<div id="intro">click to enter</div>

<div id="main">
 <div class="card" id="card">

  <div class="centerWrap">
   <div class="avatar"></div>
   <div class="name">ay3ent</div>

   <div class="links">
    <a href="https://twitch.tv/ay3ent" target="_blank" class="link">
     <img src="twitch.png"><span>twitch</span>
    </a>
    <a href="https://t.me/ay3ent" target="_blank" class="link">
     <img src="tg.png"><span>telegram</span>
    </a>
   </div>
  </div>

  <div class="player">

   <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
   </div>

   <input type="range" id="progress" value="0">

   <canvas id="wave"></canvas>

   <div class="controls">
    <button id="play">▶</button>
   </div>

  </div>

 </div>
</div>

<audio id="audio" src="mus.mp3"></audio>

<script>
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const card=document.getElementById('card');
const audio=document.getElementById('audio');
const playBtn=document.getElementById('play');
const progress=document.getElementById('progress');
const current=document.getElementById('current');
const duration=document.getElementById('duration');

const canvas=document.getElementById('wave');
const ctx=canvas.getContext('2d');

let analyser,source,ctxAudio;

function resize(){
 canvas.width=canvas.offsetWidth;
 canvas.height=canvas.offsetHeight;
}
window.addEventListener('resize',resize);
resize();

intro.onclick=()=>{
 intro.style.display='none';
 main.style.display='block';
 setTimeout(()=>card.classList.add('show'),50);

 ctxAudio=new(window.AudioContext||window.webkitAudioContext)();
 analyser=ctxAudio.createAnalyser();
 analyser.fftSize=128;

 source=ctxAudio.createMediaElementSource(audio);
 source.connect(analyser);
 analyser.connect(ctxAudio.destination);

 audio.play();
 playBtn.textContent='⏸';

 animate();
};

playBtn.onclick=()=>{
 if(audio.paused){
  audio.play();
  playBtn.textContent='⏸';
 }else{
  audio.pause();
  playBtn.textContent='▶';
 }
};

audio.onloadedmetadata=()=>{
 duration.textContent=format(audio.duration);
};

audio.ontimeupdate=()=>{
 let percent=(audio.currentTime/audio.duration)*100;
 progress.value=percent;
 progress.style.setProperty('--progress',percent+'%');
 current.textContent=format(audio.currentTime);
};

progress.oninput=()=>{
 audio.currentTime=(progress.value/100)*audio.duration;
};

function format(t){
 let m=Math.floor(t/60);
 let s=Math.floor(t%60);
 if(s<10)s='0'+s;
 return m+':'+s;
}

function animate(){
 requestAnimationFrame(animate);

 let data=new Uint8Array(analyser.frequencyBinCount);
 analyser.getByteFrequencyData(data);

 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.beginPath();
 ctx.lineWidth=2;

 let gradient=ctx.createLinearGradient(0,0,canvas.width,0);
 gradient.addColorStop(0,'#6a00ff');
 gradient.addColorStop(1,'#00c3ff');

 ctx.strokeStyle=gradient;

 let step=canvas.width/data.length;

 for(let i=0;i<data.length;i++){
  let x=i*step;
  let y=canvas.height/2+(data[i]/255-0.5)*50;

  if(i===0) ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 }

 ctx.stroke();

 let bass=data[1]/255;
 card.style.transform=`translate(-50%,-50%) scale(${1+bass*0.03})`;
}
</script>

</body>
</html>
